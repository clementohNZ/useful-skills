<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mockups Index</title>
<style>
  :root {
    --bg: #0e0f12; --panel: #16181d; --line: #262a31;
    --fg: #e9ecf1; --dim: #9aa3af; --accent: #b8fa30;
    --list-w: 420px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg); color: var(--fg);
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex; flex-direction: column; height: 100vh; overflow: hidden;
  }
  header { border-bottom: 1px solid var(--line); padding: 14px 18px; flex: none; }
  .top { display: flex; align-items: center; gap: 14px; }
  h1 { font-size: 19px; font-weight: 800; letter-spacing: -0.02em; }
  .count { color: var(--accent); font-weight: 700; }
  .spacer { flex: 1; }
  .sidebar-tools { flex: none; display: grid; gap: 9px; padding: 14px; border-bottom: 1px solid var(--line); }
  .controls { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 8px; }
  .tool-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .tool-label { color: var(--dim); font-family: ui-monospace, "JetBrains Mono", monospace; font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; }
  input[type="search"], select {
    background: var(--panel); border: 1px solid var(--line); color: var(--fg);
    font: inherit; font-size: 13px; padding: 7px 10px; outline: none; min-width: 0;
  }
  input[type="search"] { width: 100%; }
  input[type="search"]:focus, select:focus { border-color: var(--accent); }
  .seg { display: inline-flex; border: 1px solid var(--line); flex: none; }
  .seg button {
    background: transparent; border: 0; color: var(--dim);
    font: inherit; font-size: 12px; font-weight: 600; padding: 7px 12px; cursor: pointer;
  }
  .seg button.on { background: var(--accent); color: #0e0f12; }
  .seg button + button { border-left: 1px solid var(--line); }

  .layout { flex: 1; min-height: 0; display: grid; grid-template-columns: var(--list-w) 8px 1fr; }
  .layout[data-mode="tab"], .layout[data-empty="true"] { grid-template-columns: 1fr; }
  .layout[data-mode="tab"] .preview, .layout[data-mode="tab"] .resizer,
  .layout[data-empty="true"] .preview, .layout[data-empty="true"] .resizer { display: none; }
  .layout.resizing { user-select: none; }
  .layout.resizing iframe { pointer-events: none; }

  .sidebar { min-width: 0; min-height: 0; display: flex; flex-direction: column; border-right: 1px solid var(--line); }
  .list { min-height: 0; overflow: auto; padding: 14px; }
  .layout[data-mode="tab"] .sidebar { max-width: 1000px; margin: 0 auto; width: 100%; border-right: 0; }

  /* Drag handle between list and preview. */
  .resizer { position: relative; cursor: col-resize; touch-action: none; }
  .resizer::before { content: ""; position: absolute; top: 0; bottom: 0; left: 3px; width: 2px; background: var(--line); }
  .resizer:hover::before, .resizer.dragging::before { background: var(--accent); }

  .group, .day { margin-bottom: 16px; }
  .group-h, .day-h {
    display: flex; align-items: center; gap: 8px; width: 100%; text-align: left;
    background: transparent; border: 0; padding: 4px 0 8px; color: var(--dim);
    font-family: ui-monospace, "JetBrains Mono", monospace; font-size: 11px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
  }
  .group-h { cursor: pointer; }
  .group-h:hover { color: var(--fg); }
  .group-h .chev { font-size: 9px; transition: transform .12s; }
  .group.collapsed .group-h .chev { transform: rotate(-90deg); }
  .group-h .gcount, .day-h .gcount { margin-left: auto; color: var(--dim); font-weight: 600; }
  .group.collapsed .group-items { display: none; }
  .day-h::after { content: ""; height: 1px; flex: 1; margin-left: 4px; background: var(--line); }
  .day-h .gcount { order: 2; margin-left: 0; }

  a.card {
    display: flex; align-items: center; gap: 12px;
    border: 1px solid var(--line); background: var(--panel);
    padding: 10px 12px; margin-bottom: 6px; text-decoration: none; color: inherit; cursor: pointer;
    transition: border-color .12s;
  }
  a.card:hover { border-color: var(--accent); }
  a.card.active { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 12%, var(--panel)); }
  .num { font-family: ui-monospace, monospace; font-size: 12px; font-weight: 700; color: var(--accent); min-width: 56px; }
  .meta { display: flex; flex-direction: column; min-width: 0; flex: 1; }
  .title { font-weight: 600; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .sub { color: var(--dim); font-size: 11px; margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .badge { font-family: ui-monospace, monospace; font-size: 10px; color: var(--dim); border: 1px solid var(--line); padding: 2px 7px; white-space: nowrap; }
  .no-match { color: var(--dim); font-size: 14px; padding: 30px; text-align: center; border: 1px dashed var(--line); }
  mark { background: var(--accent); color: #0e0f12; }

  .preview { min-width: 0; display: flex; flex-direction: column; background: #fff; }
  .preview-bar { flex: none; display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: var(--panel); border-bottom: 1px solid var(--line); }
  .preview-bar .pt { font-size: 13px; font-weight: 600; min-width: 0; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .preview-bar a { color: var(--accent); font-size: 12px; text-decoration: none; border: 1px solid var(--line); padding: 5px 9px; white-space: nowrap; }
  .preview-bar a:hover { border-color: var(--accent); }
  .preview-bar a[aria-disabled="true"] { opacity: .4; pointer-events: none; }
  iframe { flex: 1; border: 0; width: 100%; background: #fff; }

  /* Onboarding (shown when there are no mockups yet). */
  .onboard { max-width: 640px; margin: 6vh auto; padding: 0 24px; }
  .onboard .ob-badge { display: inline-block; font-family: ui-monospace, monospace; font-size: 12px; font-weight: 700; color: #0e0f12; background: var(--accent); padding: 3px 9px; }
  .onboard h2 { font-size: 24px; font-weight: 800; letter-spacing: -0.02em; margin: 14px 0 8px; }
  .onboard p { color: var(--dim); font-size: 14px; line-height: 1.6; }
  .onboard ol { margin: 16px 0; padding-left: 20px; display: flex; flex-direction: column; gap: 8px; }
  .onboard li { font-size: 14px; line-height: 1.5; }
  .onboard code { font-family: ui-monospace, monospace; font-size: 12.5px; background: var(--panel); border: 1px solid var(--line); padding: 2px 6px; color: var(--fg); }
  .ob-example { margin: 18px 0; border: 1px solid var(--line); background: var(--panel); padding: 14px 16px; }
  .ob-example .ob-label { display: block; font-family: ui-monospace, monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--dim); margin-bottom: 8px; }
  .ob-example code { display: block; border: 0; background: transparent; padding: 0; font-size: 14px; color: var(--accent); }
  .ob-foot { margin-top: 20px; font-size: 12.5px; }

  @media (max-width: 760px) {
    .layout, .layout[data-mode="panel"] { grid-template-columns: 1fr; }
    .layout .preview, .layout .resizer { display: none; }
  }
</style>
</head>
<body>
  <header>
    <div class="top">
      <h1>Mockups <span class="count" id="total"></span></h1>
    </div>
  </header>

  <div class="layout" id="layout" data-mode="panel" data-view="recent">
    <aside class="sidebar">
      <div class="sidebar-tools">
        <div class="controls">
          <input type="search" id="q" placeholder="Search title, category, or prompt…" aria-label="Search mockups" />
          <select id="cat" aria-label="Filter by category"><option value="">All categories</option></select>
        </div>
        <div class="tool-row">
          <span class="tool-label">Arrange</span>
          <div class="seg" id="view" role="group" aria-label="Arrange mockups">
            <button type="button" data-view="recent">Recent</button>
            <button type="button" data-view="group">Group</button>
          </div>
        </div>
        <div class="tool-row">
          <span class="tool-label">Open in</span>
          <div class="seg" id="mode" role="group" aria-label="Open mode">
            <button type="button" data-mode="panel">Side panel</button>
            <button type="button" data-mode="tab">New tab</button>
          </div>
        </div>
      </div>
      <div class="list" id="list"></div>
    </aside>
    <div class="resizer" id="resizer" role="separator" aria-orientation="vertical" aria-label="Resize the list"></div>
    <main class="preview">
      <div class="preview-bar">
        <span class="pt" id="ptitle">Select a mockup to preview</span>
        <a id="openext" href="#" target="_blank" rel="noopener" aria-disabled="true">Open in new tab ↗</a>
      </div>
      <iframe id="frame" title="Mockup preview"></iframe>
    </main>
  </div>

  <script src="./manifest.js"></script>
  <script>
    (function () {
      const all = (window.MOCKUPS || []).slice().sort((a, b) => b.n - a.n);
      const listEl = document.getElementById("list");
      const totalEl = document.getElementById("total");
      const qEl = document.getElementById("q");
      const catEl = document.getElementById("cat");
      const layout = document.getElementById("layout");
      const modeSeg = document.getElementById("mode");
      const viewSeg = document.getElementById("view");
      const resizer = document.getElementById("resizer");
      const frame = document.getElementById("frame");
      const ptitle = document.getElementById("ptitle");
      const openext = document.getElementById("openext");

      const MIN_W = 260, MAX_W = 620;

      // ---- Preference storage: cookie first, with a localStorage fallback so it
      // still persists on file:// (where browsers drop cookies). ----
      function setPref(key, val) {
        try { document.cookie = key + "=" + encodeURIComponent(val) + "; path=/; max-age=31536000; SameSite=Lax"; } catch (e) {}
        try { localStorage.setItem(key, val); } catch (e) {}
      }
      function getPref(key) {
        const m = document.cookie.match(new RegExp("(?:^|; )" + key.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + "=([^;]*)"));
        if (m) { try { return decodeURIComponent(m[1]); } catch (e) { return m[1]; } }
        try { return localStorage.getItem(key); } catch (e) { return null; }
      }

      totalEl.textContent = all.length ? "· " + all.length : "";

      const groups = [...new Set(all.map((m) => m.group || "ungrouped"))].sort();
      for (const g of groups) {
        const o = document.createElement("option");
        o.value = g;
        o.textContent = g.replace(/-/g, " ");
        catEl.appendChild(o);
      }

      let mode = getPref("mockups_mode") || "panel";
      let view = getPref("mockups_view") || "recent";
      let activePath = null;
      const collapsed = new Set((getPref("mockups_collapsed") || "").split(",").filter(Boolean));

      function setMode(nextMode) {
        mode = nextMode;
        layout.setAttribute("data-mode", nextMode);
        setPref("mockups_mode", nextMode);
        [...modeSeg.children].forEach((button) => button.classList.toggle("on", button.dataset.mode === nextMode));
      }

      modeSeg.addEventListener("click", (event) => {
        const button = event.target.closest("button");
        if (button) setMode(button.dataset.mode);
      });

      function setView(nextView) {
        view = nextView === "group" ? "group" : "recent";
        layout.setAttribute("data-view", view);
        setPref("mockups_view", view);
        [...viewSeg.children].forEach((button) => button.classList.toggle("on", button.dataset.view === view));
        render();
      }

      viewSeg.addEventListener("click", (event) => {
        const button = event.target.closest("button");
        if (button) setView(button.dataset.view);
      });

      function preview(m) {
        activePath = m.path;
        frame.src = m.path;
        ptitle.textContent = m.title || m.path;
        openext.href = m.path;
        openext.setAttribute("aria-disabled", "false");
        [...listEl.querySelectorAll("a.card")].forEach((a) => a.classList.toggle("active", a.dataset.path === m.path));
      }

      function esc(s) {
        return String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
      }
      function highlight(text, q) {
        const s = esc(text);
        if (!q) return s;
        const i = text.toLowerCase().indexOf(q);
        if (i < 0) return s;
        return esc(text.slice(0, i)) + "<mark>" + esc(text.slice(i, i + q.length)) + "</mark>" + esc(text.slice(i + q.length));
      }

      function onboarding() {
        return (
          '<div class="onboard">' +
          '<span class="ob-badge">/mockup</span>' +
          "<h2>No mockups yet</h2>" +
          "<p>This folder collects HTML mockups made by the <strong>mockup</strong> skill — 10+ distinct concepts per idea (or however many you ask for), all on one scrollable page, saved here and listed on this searchable index.</p>" +
          "<ol>" +
          "<li>Open your coding agent (Claude Code, Cursor, Codex, …) in this project.</li>" +
          "<li>Run <code>/mockup</code> — or just ask for mockups — and describe what to explore or redesign.</li>" +
          "<li>Reload this page: your mockups show up here, grouped and previewable in the side panel.</li>" +
          "</ol>" +
          '<div class="ob-example"><span class="ob-label">Example prompt</span><code>/mockup redesign the settings page — give me 12 concepts</code></div>' +
          '<p class="ob-foot">Don\'t have the skill installed? <code>npx skills add clementohNZ/useful-skills --skill mockup</code></p>' +
          "</div>"
        );
      }

      function render() {
        if (!all.length) {
          layout.setAttribute("data-empty", "true");
          listEl.innerHTML = onboarding();
          return;
        }
        layout.removeAttribute("data-empty");

        const q = qEl.value.trim().toLowerCase();
        const cat = catEl.value;
        const filtered = all.filter((mockup) => {
          if (cat && (mockup.group || "ungrouped") !== cat) return false;
          if (!q) return true;
          return (
            (mockup.title || "").toLowerCase().includes(q) ||
            (mockup.group || "").toLowerCase().includes(q) ||
            (mockup.prompt || "").toLowerCase().includes(q)
          );
        });

        listEl.innerHTML = "";
        if (!filtered.length) {
          listEl.innerHTML = '<div class="no-match">No mockups match your search.</div>';
          return;
        }

        function createCard(mockup) {
          const anchor = document.createElement("a");
          anchor.className = "card";
          anchor.href = mockup.path;
          anchor.target = "_blank";
          anchor.rel = "noopener";
          anchor.dataset.path = mockup.path;
          if (mockup.path === activePath) anchor.classList.add("active");
          const date = mockup.createdAt || "";
          const conceptCount = mockup.concepts ? mockup.concepts + " concepts" : "";
          anchor.innerHTML =
            '<span class="num">' + (mockup.id || mockup.n) + "</span>" +
            '<span class="meta"><span class="title">' + highlight(mockup.title || mockup.path, q) + "</span>" +
            (mockup.prompt ? '<span class="sub">' + esc(mockup.prompt) + "</span>" : "") +
            "</span>" +
            '<span class="badge">' + [conceptCount, date].filter(Boolean).join(" · ") + "</span>";
          anchor.addEventListener("click", (event) => {
            const previewVisible = mode === "panel" && frame.offsetParent !== null;
            if (previewVisible) {
              event.preventDefault();
              preview(mockup);
            }
          });
          return anchor;
        }

        function dateLabel(value) {
          if (!value) return "Unknown date";
          const parsed = new Date(value + "T00:00:00");
          if (Number.isNaN(parsed.getTime())) return value;
          return parsed.toLocaleDateString(undefined, { year: "numeric", month: "long", day: "numeric" });
        }

        if (view === "recent") {
          const byDay = new Map();
          for (const mockup of filtered) {
            const key = mockup.createdAt || "unknown";
            if (!byDay.has(key)) byDay.set(key, []);
            byDay.get(key).push(mockup);
          }
          for (const [day, items] of byDay) {
            const section = document.createElement("section");
            section.className = "day";
            const heading = document.createElement("div");
            heading.className = "day-h";
            heading.innerHTML = "<span>" + esc(dateLabel(day === "unknown" ? "" : day)) + '</span><span class="gcount">' + items.length + "</span>";
            section.appendChild(heading);
            const box = document.createElement("div");
            for (const mockup of items) box.appendChild(createCard(mockup));
            section.appendChild(box);
            listEl.appendChild(section);
          }
          return;
        }

        const byGroup = new Map();
        for (const mockup of filtered) {
          const key = mockup.group || "ungrouped";
          if (!byGroup.has(key)) byGroup.set(key, []);
          byGroup.get(key).push(mockup);
        }

        for (const groupName of [...byGroup.keys()].sort()) {
          const items = byGroup.get(groupName);
          const section = document.createElement("section");
          section.className = "group";
          section.dataset.group = groupName;
          if (!q && collapsed.has(groupName)) section.classList.add("collapsed");

          const heading = document.createElement("button");
          heading.type = "button";
          heading.className = "group-h";
          heading.innerHTML = '<span class="chev">▾</span><span>' + esc(groupName.replace(/-/g, " ")) + '</span><span class="gcount">' + items.length + "</span>";
          section.appendChild(heading);

          const box = document.createElement("div");
          box.className = "group-items";
          for (const mockup of items) box.appendChild(createCard(mockup));
          section.appendChild(box);
          listEl.appendChild(section);
        }
      }

      // Collapse / expand a category (persisted).
      listEl.addEventListener("click", (e) => {
        const h = e.target.closest(".group-h");
        if (!h) return;
        const sec = h.closest(".group");
        const g = sec.dataset.group;
        const nowCollapsed = sec.classList.toggle("collapsed");
        if (nowCollapsed) collapsed.add(g);
        else collapsed.delete(g);
        setPref("mockups_collapsed", [...collapsed].join(","));
      });

      // Auto-fit the sidebar to the widest row so titles never truncate by default.
      // Respects a width the user has dragged to (persisted).
      function fitSidebar() {
        const stored = getPref("mockups_listw");
        if (stored) {
          layout.style.setProperty("--list-w", stored);
          return;
        }
        const cards = [...listEl.querySelectorAll("a.card")];
        if (!cards.length) return;
        let max = 0;
        for (const card of cards) {
          const num = card.querySelector(".num");
          const title = card.querySelector(".title");
          const sub = card.querySelector(".sub");
          const badge = card.querySelector(".badge");
          const metaText = Math.max(title ? title.scrollWidth : 0, sub ? sub.scrollWidth : 0);
          const need = (num ? num.offsetWidth : 56) + 12 + metaText + 12 + (badge ? badge.offsetWidth : 0) + 24 + 2;
          if (need > max) max = need;
        }
        const w = Math.max(320, Math.min(Math.ceil(max) + 32, MAX_W));
        layout.style.setProperty("--list-w", w + "px");
      }

      // Drag-to-resize via Pointer Events + pointer capture, so the drag keeps
      // tracking even when the cursor moves over the preview iframe (the old
      // mouse-event version stalled there — you could shrink but not grow).
      let dragging = false;
      resizer.addEventListener("pointerdown", (e) => {
        dragging = true;
        try { resizer.setPointerCapture(e.pointerId); } catch (err) {}
        resizer.classList.add("dragging");
        layout.classList.add("resizing");
        e.preventDefault();
      });
      resizer.addEventListener("pointermove", (e) => {
        if (!dragging) return;
        const rect = layout.getBoundingClientRect();
        let w = e.clientX - rect.left;
        w = Math.max(MIN_W, Math.min(w, rect.width - 380));
        layout.style.setProperty("--list-w", w + "px");
      });
      function endDrag(e) {
        if (!dragging) return;
        dragging = false;
        try { resizer.releasePointerCapture(e.pointerId); } catch (err) {}
        resizer.classList.remove("dragging");
        layout.classList.remove("resizing");
        setPref("mockups_listw", layout.style.getPropertyValue("--list-w").trim());
      }
      resizer.addEventListener("pointerup", endDrag);
      resizer.addEventListener("pointercancel", endDrag);
      resizer.addEventListener("lostpointercapture", endDrag);

      qEl.addEventListener("input", render);
      catEl.addEventListener("change", render);
      setView(view);
      setMode(mode);
      render();
      fitSidebar();

      if (mode === "panel" && all.length && frame.offsetParent !== null) preview(all[0]);
    })();
  </script>
</body>
</html>
